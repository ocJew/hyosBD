<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo de Vídeos da Internet</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>

<body>

    <header class="glass">
        <h1>Catálogo de Vídeos</h1>

        <div class="search-and-actions">
            <div class="search-container">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar títulos ou descrições..." autocomplete="off">
            </div>

            <div class="header-actions">
                <button id="toggleDarkMode" title="Alternar tema"><i data-lucide="moon"></i></button>
                <button id="toggleFilter" title="Filtrar"><i data-lucide="filter"></i></button>
                <button id="openAddModal" title="Adicionar Vídeo"><i data-lucide="plus"></i></button>
            </div>
        </div>
    </header>

    <main>
        <section class="filter-area" id="filterContainer">
            <h2>Filtro de Conteúdo</h2>

            <h3 style="margin-bottom: 10px;">Filtros Ativos:</h3>
            <div id="activeFilters" class="active-filters-container">
            </div>

            <h3 style="margin-top: 25px; margin-bottom: 10px;">Tags Disponíveis:</h3>
            <div id="availableTagsList" class="available-tags-container">
            </div>

            <button id="showAllButton" class="show-all-button">Mostrar Todos os Vídeos</button>

        </section>

        <section class="results-area">
            <h2><i data-lucide="layout-grid"></i> Vídeos Disponíveis</h2>
            <div id="videoList" class="video-grid">
            </div>
        </section>
    </main>

    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModal">&times;</span>
            <h2 id="modalTitle">Adicionar Novo Vídeo</h2>

            <section class="admin-form" id="admin-form-section">
                <input type="url" id="url" placeholder="Link do Vídeo (YouTube, TikTok, etc.)" required>
                <input type="text" id="titulo" placeholder="Título do Vídeo" required>

                <select id="tags" multiple="multiple" style="width: 100%;" required>
                </select>

                <textarea id="descricao" placeholder="Descrição ou utilidade"></textarea>
                <button id="addButton">Salvar Vídeo</button>
                <p id="message"></p>
            </section>
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>

</html>
